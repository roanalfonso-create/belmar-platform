<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Belmar Cloud — Forecast Tracker</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#fff;--bg2:#f7f7f5;--bg3:#f0ede8;
  --text:#1a1a18;--text2:#6b6b68;--text3:#9a9a96;
  --border:rgba(0,0,0,0.12);--border2:rgba(0,0,0,0.22);
  --info-bg:#e6f1fb;--info-text:#0c447c;--info-border:#b5d4f4;
  --success-bg:#eaf3de;--success-text:#27500a;
  --warn-bg:#faeeda;--warn-text:#633806;
  --danger-bg:#fcebeb;--danger-text:#791f1f;
  --blue:#378ADD;--green:#639922;--amber:#BA7517;--purple:#7F77DD;--red:#E24B4A;--orange:#EF9F27;
  --radius:8px;--radius-lg:12px;
}
@media(prefers-color-scheme:dark){:root{
  --bg:#1c1c1a;--bg2:#252523;--bg3:#2e2e2b;
  --text:#f0ede8;--text2:#9a9a96;--text3:#6b6b68;
  --border:rgba(255,255,255,0.1);--border2:rgba(255,255,255,0.2);
  --info-bg:#0c2d4a;--info-text:#85b7eb;--info-border:#185fa5;
  --success-bg:#172804;--success-text:#c0dd97;
  --warn-bg:#2a1800;--warn-text:#fac775;
  --danger-bg:#2a0a0a;--danger-text:#f09595;
}}
html,body{height:100%;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:var(--bg3);color:var(--text);font-size:14px;line-height:1.5}
.app{display:flex;flex-direction:column;min-height:100vh}
.topbar{background:var(--bg);border-bottom:0.5px solid var(--border);padding:0 24px;height:52px;display:flex;align-items:center;justify-content:space-between;gap:16px;position:sticky;top:0;z-index:100}
.topbar-brand{font-size:15px;font-weight:500;display:flex;align-items:center;gap:8px;color:var(--text);text-decoration:none}
.topbar-brand span{color:var(--text2);font-weight:400;font-size:13px}
.topbar-controls{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.main{max-width:1200px;margin:0 auto;width:100%;padding:24px 20px;flex:1}
.card{background:var(--bg);border:0.5px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;margin-bottom:16px}
.card-head{padding:10px 16px;border-bottom:0.5px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
.card-title{font-size:13px;font-weight:500}
.metrics-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px;margin-bottom:16px}
.metric{background:var(--bg2);border-radius:var(--radius);padding:14px 16px}
.metric-lbl{font-size:10px;color:var(--text2);text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px}
.metric-val{font-size:22px;font-weight:500;line-height:1.1}
.metric-sub{font-size:11px;color:var(--text2);margin-top:3px}
.tabs{display:flex;gap:0;border-bottom:0.5px solid var(--border);margin-bottom:16px;overflow-x:auto}
.tab{font-size:13px;padding:8px 14px;border:none;border-bottom:2px solid transparent;background:transparent;color:var(--text2);cursor:pointer;white-space:nowrap}
.tab.active{color:var(--text);border-bottom-color:var(--blue);font-weight:500}
.tab:hover:not(.active){color:var(--text)}
.trow{display:grid;gap:6px;align-items:center;padding:7px 16px;border-bottom:0.5px solid var(--border);font-size:12px}
.trow:last-child{border-bottom:none}
.trow-hdr{font-size:10px;color:var(--text2);font-weight:500;padding:5px 16px}
.du{color:var(--success-text)}.dd{color:var(--danger-text)}.df{color:var(--text2)}
.spark{height:4px;border-radius:2px;background:var(--blue)}
.pill{font-size:10px;padding:2px 8px;border-radius:20px;font-weight:500;white-space:nowrap;display:inline-block}
.pill-opening{background:var(--info-bg);color:var(--info-text)}
.pill-weekly{background:var(--success-bg);color:var(--success-text)}
.pill-actual{background:var(--warn-bg);color:var(--warn-text)}
.pill-live{background:#eeedfe;color:#3c3489}
.status-bar{padding:8px 14px;font-size:12px;border-radius:var(--radius);margin-bottom:16px;display:flex;align-items:center;gap:8px}
.status-loading{background:var(--bg2);color:var(--text2)}
.status-ok{background:var(--success-bg);color:var(--success-text)}
.status-err{background:var(--danger-bg);color:var(--danger-text)}
.status-warn{background:var(--warn-bg);color:var(--warn-text)}
select,input[type=date],input[type=range]{font-size:12px;padding:5px 9px;border-radius:var(--radius);border:0.5px solid var(--border2);background:var(--bg);color:var(--text);cursor:pointer}
input[type=range]{padding:0;height:20px}
.btn{font-size:12px;padding:5px 12px;border-radius:var(--radius);border:0.5px solid var(--border2);background:transparent;color:var(--text);cursor:pointer;display:inline-flex;align-items:center;gap:5px}
.btn:hover{background:var(--bg2)}.btn:disabled{opacity:0.5;cursor:not-allowed}
.btn-primary{background:var(--info-bg);border-color:var(--info-border);color:var(--info-text)}
.btn-primary:hover{opacity:0.85;background:var(--info-bg)}
.btn-icon{width:26px;height:26px;padding:0;display:inline-flex;align-items:center;justify-content:center;border-radius:var(--radius)}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
.spin{display:inline-block;animation:spin 1s linear infinite}
.legend{display:flex;gap:14px;font-size:11px;flex-wrap:wrap;color:var(--text2)}
.legend span{display:flex;align-items:center;gap:4px}
.dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.sq{width:9px;height:9px;border-radius:2px;flex-shrink:0}
/* Drill-down rows */
.drill-row{display:grid;gap:6px;align-items:center;padding:5px 16px 5px 36px;border-bottom:0.5px solid var(--border);font-size:11px;background:var(--bg2);color:var(--text2)}
.drill-row:last-child{border-bottom:none}
.expandable{cursor:pointer}
.expandable:hover{background:var(--bg2)}
.expand-btn{background:none;border:none;cursor:pointer;color:var(--text2);display:inline-flex;align-items:center;padding:0;font-size:12px;transition:transform 0.15s}
.expand-btn.open{transform:rotate(90deg)}
/* Capacity badge */
.cap-badge{font-size:10px;padding:2px 7px;border-radius:20px;font-weight:500;display:inline-block;white-space:nowrap}
.cap-available{background:var(--success-bg);color:var(--success-text)}
.cap-full{background:var(--bg2);color:var(--text2)}
.cap-over{background:var(--danger-bg);color:var(--danger-text)}
.cap-bar-wrap{height:6px;background:var(--border);border-radius:3px;overflow:hidden;min-width:60px}
.cap-bar{height:100%;border-radius:3px;transition:width 0.3s}
/* Setup banner */
#setupBanner{background:var(--warn-bg);color:var(--warn-text);border:0.5px solid #fac775;border-radius:var(--radius);padding:10px 14px;font-size:12px;margin-bottom:16px;display:none}
#setupBanner code{background:rgba(0,0,0,0.1);padding:1px 5px;border-radius:3px;font-family:monospace}
@media(max-width:600px){.topbar{padding:0 12px}.main{padding:16px 12px}}
</style>
</head>
<body>
<div class="app">
<header class="topbar">
  <a class="topbar-brand" href="#"><i class="ti ti-chart-bar" aria-hidden="true"></i>Belmar Cloud <span>Forecast Tracker</span></a>
  <div class="topbar-controls">
    <label style="font-size:12px;color:var(--text2)">Cutover:</label>
    <input type="date" id="cutoverDate" value="2026-05-22">
    <label style="font-size:12px;color:var(--text2)">Month:</label>
    <select id="monthFilter">
      <option value="Feb">February</option>
      <option value="March">March</option>
      <option value="April">April</option>
      <option value="May" selected>May (live)</option>
    </select>
    <label style="font-size:12px;color:var(--text2)">Capacity threshold:</label>
    <input type="number" id="capThreshold" value="0" min="0" max="40" step="5" style="width:60px;font-size:12px;padding:5px 8px">
    <span style="font-size:12px;color:var(--text2)">h</span>
    <button class="btn btn-primary" id="refreshBtn"><i class="ti ti-refresh" aria-hidden="true"></i> Refresh</button>
  </div>
</header>
<main class="main">
  <div id="setupBanner"><strong><i class="ti ti-settings" aria-hidden="true"></i> Setup:</strong> Set <code>PROXY_URL</code> in the script to your Cloudflare proxy Worker URL to enable live Ruddr data.</div>
  <div id="statusBar" class="status-bar status-loading"><i class="ti ti-loader-2 spin" aria-hidden="true"></i><span id="statusMsg">Initialising...</span></div>
  <div id="metrics" class="metrics-grid"></div>
  <nav class="tabs" role="tablist">
    <button class="tab active" role="tab" onclick="switchTab('heatmap',this)">Shortfall map</button>
    <button class="tab" role="tab" onclick="switchTab('projects',this)">By project</button>
    <button class="tab" role="tab" onclick="switchTab('members',this)">By member</button>
    <button class="tab" role="tab" onclick="switchTab('capacity',this)">Capacity</button>
    <button class="tab" role="tab" onclick="switchTab('timeline',this)">Timeline</button>
    <button class="tab" role="tab" onclick="switchTab('history',this)">Month history</button>
  </nav>
  <div id="tab-heatmap" role="tabpanel"></div>
  <div id="tab-projects" role="tabpanel" style="display:none"></div>
  <div id="tab-members" role="tabpanel" style="display:none"></div>
  <div id="tab-capacity" role="tabpanel" style="display:none"></div>
  <div id="tab-timeline" role="tabpanel" style="display:none"></div>
  <div id="tab-history" role="tabpanel" style="display:none"></div>
</main>
</div>

const r1=v=>Math.round(v*10)/10;
const r0=v=>Math.round(v);

function setStatus(type,msg){
  const bar=document.getElementById('statusBar');
  bar.className='status-bar status-'+type;
  const icons={loading:'ti-loader-2 spin',ok:'ti-circle-check',err:'ti-circle-x',warn:'ti-alert-triangle'};

}
function destroyChart(id){if(charts[id]){charts[id].destroy();delete charts[id];}}
function getSnaps(mon){return SNAPS_BY_MONTH[mon]||[];}
function getOpening(snaps){return snaps.find(s=>s.type==='opening');}
function getLatest(snaps){return snaps[snaps.length-1];}
function getActual(snaps){return snaps.find(s=>s.type==='actual');}
function isDark(){return matchMedia('(prefers-color-scheme:dark)').matches;}
function chartColors(){return{gc:isDark()?'rgba(255,255,255,0.07)':' rgba(0,0,0,0.07)',tc:isDark()?'rgba(255,255,255,0.45)':' rgba(0,0,0,0.45)',lc:isDark()?'rgba(255,255,255,0.5)':' rgba(0,0,0,0.45)'};}

// ── Live pull ──────────────────────────────────────────────
async function triggerLivePull(){
  if(!PROXY_URL){
    document.getElementById('setupBanner').style.display='block';
    setStatus('warn','PROXY_URL not configured — showing CSV data only.');
    return;
  }
  const cutover=document.getElementById('cutoverDate').value;
  const btn=document.getElementById('refreshBtn');
  btn.disabled=true;btn.innerHTML='<i class="ti ti-loader-2 spin" aria-hidden="true"></i> Pulling...';
  setStatus('loading',`Fetching from Ruddr — actuals through ${cutover}...`);
  const cutoverDt=new Date(cutover);
  const monthStart=`${cutoverDt.getFullYear()}-${String(cutoverDt.getMonth()+1).padStart(2,'0')}-01`;
  const monthEnd=new Date(cutoverDt.getFullYear(),cutoverDt.getMonth()+1,0).toISOString().slice(0,10);
  const nextDay=new Date(cutoverDt);nextDay.setDate(nextDay.getDate()+1);
  const forecastFrom=nextDay.toISOString().slice(0,10);

  const prompt=`You are a data extraction assistant for Belmar Cloud. Use Ruddr MCP tools and return ONLY a raw JSON object.

Tasks:
1. Fetch ALL time entries: typeId="project_time", dateOnAfter="${monthStart}", dateOnBefore="${cutover}". Paginate startingAfter until hasMore false. Sum the hours field by project name AND by member name. Record each member's hours per project.

2. Fetch ALL project allocations: assignmentTypeId="project", startOnBefore="${monthEnd}", endOnAfter="${forecastFrom}". Paginate until hasMore false. Prorate each to ${forecastFrom}–${monthEnd} window. Sum by project AND by member.

3. Fetch ALL time-off allocations: assignmentTypeId="time_off", startOnBefore="${monthEnd}", endOnAfter="${monthStart}". Paginate until hasMore false. For each, calculate the hours that fall within ${monthStart}–${monthEnd} only. Sum timeOffHrs per member. This covers stat holidays, approved vacation, and sick days.

4. Fetch ALL active+billable members (paginate all pages using startingAfter). For each member:
   a. Find their active availabilityPeriod where start <= "${monthEnd}" and (end is null or end >= "${monthStart}")
   b. hoursPerDay is a 7-element array [Mon,Tue,Wed,Thu,Fri,Sat,Sun]
   c. Count the actual number of each weekday that falls in ${monthStart}–${monthEnd}
   d. rawCapacityHrs = sum of (hoursPerDay[i] × count of that weekday in month) for i=0..6
   e. timeOffHrs = hours from step 3 for this member (0 if none)
   f. adjustedCapacityHrs = max(0, rawCapacityHrs − timeOffHrs)

5. Merge time entries + project allocations per project and per member.

Return exactly this JSON shape and nothing else:
{
  "cutover":"${cutover}","monthStart":"${monthStart}","monthEnd":"${monthEnd}",
  "totalHours":<n>,
  "byProject":{"<project>":{"hrs":<n>,"members":{"<member>":<hrs>}}},
  "byMember":{
    "<member>":{
      "hrs":<n>,
      "rawCapacityHrs":<n>,
      "timeOffHrs":<n>,
      "adjustedCapacityHrs":<n>,
      "projects":{"<project>":<hrs>}
    }
  },
  "error":null
}
Return ONLY the JSON object, no markdown, no backticks, no explanation.`;

  try{
    const res=await fetch(`${PROXY_URL}/v1/messages`,{method:'POST',headers:{'Content-Type':'application/json','anthropic-version':'2023-06-01','anthropic-beta':'mcp-client-2025-04-04'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:6000,mcp_servers:[{type:'url',url:RUDDR_MCP_URL,name:'ruddr'}],messages:[{role:'user',content:prompt}]})});
    if(!res.ok)throw new Error(`API ${res.status}: ${(await res.text()).slice(0,120)}`);
    const data=await res.json();
    const text=data.content.filter(b=>b.type==='text').map(b=>b.text).join('');
    const parsed=JSON.parse(text.replace(/```json|```/g,'').trim());
    const snap={period:'Live',type:'live',label:`May Live (${cutover})`,totalHours:parsed.totalHours,byProject:parsed.byProject,byMember:parsed.byMember,cutover:parsed.cutover,pulledAt:new Date().toLocaleTimeString()};
    // Extract capacity
    memberCapacity={};
    for(const[name,v] of Object.entries(parsed.byMember||{})){
      if(v.adjustedCapacityHrs!=null) memberCapacity[name]=v.adjustedCapacityHrs;
    }
    const idx=SNAPS_BY_MONTH['May'].findIndex(s=>s.type==='live');
    if(idx>=0)SNAPS_BY_MONTH['May'][idx]=snap;else SNAPS_BY_MONTH['May'].push(snap);
    setStatus(parsed.error?'warn':'ok',parsed.error?`Partial data: ${parsed.error}`:`Live data loaded · ${Object.keys(parsed.byProject||{}).length} projects · ${Object.keys(parsed.byMember||{}).length} members · refreshed ${snap.pulledAt}`);
    renderAll();
  }catch(e){
    setStatus('err',`Live pull failed: ${e.message}. Showing CSV data only.`);
    console.error(e);
  }finally{
    btn.disabled=false;btn.innerHTML='<i class="ti ti-refresh" aria-hidden="true"></i> Refresh';
  }
}

// ── Metrics ────────────────────────────────────────────────
function renderMetrics(){
  const mon=document.getElementById('monthFilter').value;
  const snaps=getSnaps(mon);
  const opening=getOpening(snaps),latest=getLatest(snaps),actual=getActual(snaps);
  const isLive=latest?.type==='live';
  const varH=opening&&latest?r1(latest.totalHours-opening.totalHours):null;
  const cards=[
    {lbl:'Opening forecast',val:opening?fmtH(opening.totalHours):'—',sub:opening?opening.label:'Not captured'},
    {lbl:isLive?'Live (Ruddr)':'Latest forecast',val:latest?fmtH(latest.totalHours):'—',sub:latest?(isLive?`Pulled ${latest.pulledAt}`:latest.label):'—'},
    {lbl:'Month actual',val:actual?fmtH(actual.totalHours):'—',sub:actual?actual.label:'In progress'},
    {lbl:'Variance (open→now)',val:varH!=null?(varH>=0?'+':'')+varH+'h':'—',sub:varH!=null&&opening?r1(latest.totalHours/opening.totalHours*100)+'% of opening':'Need opening'},
  ];
  document.getElementById('metrics').innerHTML=cards.map(c=>`<div class="metric"><div class="metric-lbl">${c.lbl}</div><div class="metric-val">${c.val}</div><div class="metric-sub">${c.sub}</div></div>`).join('');
}

  for(const[name,ov]of Object.entries(opening.byProject)){
    const lv=(latest.byProject[name]||{hrs:0}).hrs;
    const drop=ov.hrs-lv;
    if(drop>0.05)shortfalls.push({name,openHrs:ov.hrs,latestHrs:lv,drop:Math.round(drop*10)/10});
  }
  if(!shortfalls.length){el.innerHTML='<div class="card"><div style="padding:1.5rem;text-align:center;color:var(--success-text)"><i class="ti ti-circle-check" aria-hidden="true"></i> No shortfalls vs opening.</div></div>';return;}
  shortfalls.sort((a,b)=>b.drop-a.drop);
  const totalDrop=Math.round(shortfalls.reduce((s,p)=>s+p.drop,0)*10)/10;
  const openTotal=r1(opening.totalHours),latestTotal=r1(latest.totalHours);
  const isLive=latest.type==='live';

  el.innerHTML=`
    <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-bottom:16px">
      <div class="metric"><div class="metric-lbl">In shortfall</div><div class="metric-val">${shortfalls.length}</div><div class="metric-sub">of ${Object.keys(opening.byProject).length} projects</div></div>
      <div class="metric"><div class="metric-lbl">Total dropped</div><div class="metric-val" style="color:var(--red)">−${totalDrop}h</div><div class="metric-sub">${openTotal}h → ${latestTotal}h</div></div>
      <div class="metric"><div class="metric-lbl">Largest drop</div><div class="metric-val" style="color:var(--red)">−${shortfalls[0].drop}h</div><div class="metric-sub" style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${shortfalls[0].name}</div></div>
      <div class="metric"><div class="metric-lbl">% at risk</div><div class="metric-val" style="color:var(--red)">${Math.round(totalDrop/openTotal*1000)/10}%</div><div class="metric-sub">of opening ${openTotal}h</div></div>
    </div>
    <div class="card" style="margin-bottom:16px">
      <div class="card-head">
        <div class="card-title">Shortfall map — ${isLive?'live':latest.label} vs ${mon} P1</div>
        <div class="legend" style="margin:0">
          <span><span class="dot" style="background:#E24B4A"></span>Critical (&gt;20h)</span>
          <span><span class="dot" style="background:#EF9F27"></span>Watch (10–20h)</span>
          <span><span class="dot" style="background:#85B7EB"></span>Minor (&lt;10h)</span>
        </div>
      </div>
      <div style="padding:14px 16px 6px">
        <div style="text-align:right;font-size:10px;color:var(--text2);margin-bottom:4px">Highest risk <i class="ti ti-arrow-up-right" aria-hidden="true" style="font-size:10px"></i></div>
        <div style="position:relative;width:100%;height:280px"><canvas id="hmCanvas" role="img" aria-label="Shortfall bubble chart."></canvas></div>
        <div style="display:flex;justify-content:space-between;font-size:10px;color:var(--text2);padding:2px 4px 0"><span>← Smaller</span><span style="font-weight:500">Current forecast hours →</span><span>Larger →</span></div>
      </div>
    </div>
    <div class="card">
      <div class="card-head"><div class="card-title">Shortfall detail</div><span style="font-size:11px;color:var(--text2)">${isLive?`Live as of ${latest.cutover}`:latest.label} vs opening</span></div>
      <div class="trow trow-hdr" style="grid-template-columns:14px minmax(0,1fr) 64px 64px 64px 50px"><span></span><span>Project</span><span style="text-align:right">Opening</span><span style="text-align:right">Latest</span><span style="text-align:right">Drop</span><span style="text-align:right">Risk</span></div>
      ${shortfalls.map(p=>{const dot=p.drop>20?'#E24B4A':p.drop>10?'#EF9F27':'#85B7EB';const risk=p.drop>20?'Critical':p.drop>10?'Watch':'Minor';return`<div class="trow" style="grid-template-columns:14px minmax(0,1fr) 64px 64px 64px 50px"><div style="width:7px;height:7px;border-radius:50%;background:${dot}"></div><span style="white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${p.name}</span><span style="text-align:right;color:var(--text2)">${fmtH(p.openHrs)}</span><span style="text-align:right;font-weight:500">${fmtH(p.latestHrs)}</span><span style="text-align:right;font-weight:500;color:var(--red)">−${p.drop}h</span><span style="text-align:right;font-size:11px;color:${dot};font-weight:500">${risk}</span></div>`;}).join('')}

  const ctx=document.getElementById('hmCanvas');
  if(ctx){charts['hm']=new Chart(ctx,{type:'bubble',data:{datasets:[{data:bubbles,backgroundColor:bC,borderColor:bB,borderWidth:1.5}]},options:{responsive:true,maintainAspectRatio:false,layout:{padding:{top:10,right:12,bottom:6,left:8}},plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>{const d=c.raw;return[d.name,`Current: ${d.x}h`,`Opening: ${d.openHrs}h`,`Drop: −${d.drop}h`];}},bodyFont:{size:11},padding:9,backgroundColor:dark?'#2C2C2A':'#fff',titleColor:dark?'#fff':'#000',bodyColor:dark?'rgba(255,255,255,0.7)':'rgba(0,0,0,0.6)',borderColor:dark?'rgba(255,255,255,0.15)':'rgba(0,0,0,0.12)',borderWidth:0.5}},scales:{x:{title:{display:true,text:'Current forecast (hours)',color:lc,font:{size:10}},ticks:{color:tc,callback:v=>v+'h',font:{size:10}},grid:{color:gc},min:0,max:Math.ceil(maxX*1.08)},y:{title:{display:true,text:'Hours dropped from opening',color:lc,font:{size:10}},ticks:{color:tc,callback:v=>v+'h',font:{size:10}},grid:{color:gc},min:0,max:Math.ceil(maxDrop*1.12)}}},plugins:[zonePlugin]});}
}

// ── Projects (with drill-down to members) ──────────────────
function renderProjects(){
  const mon=document.getElementById('monthFilter').value;
  const el=document.getElementById('tab-projects');
  const snaps=getSnaps(mon);
  const opening=getOpening(snaps),latest=getLatest(snaps);

  const isLive=latest.type==='live';
  const projects=Object.entries(latest.byProject).filter(([,v])=>v.hrs>0).sort((a,b)=>b[1].hrs-a[1].hrs);
  const maxH=projects[0]?.[1].hrs||1;

  let rows='';
  for(const[p,v]of projects){

    const rowId='proj_'+p.replace(/[^a-z0-9]/gi,'_');

      <button class="expand-btn" id="btn_${rowId}" aria-label="Expand ${p}" ${hasDrill?'':' style="visibility:hidden"'} onclick="event.stopPropagation();toggleDrill('${rowId}')"><i class="ti ti-chevron-right" aria-hidden="true" style="font-size:12px"></i></button>
      <div style="display:flex;align-items:center;gap:7px;min-width:0"><div class="spark" style="width:${bw}px;flex-shrink:0;max-width:50px"></div><span style="white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${p}</span></div>
      <span style="text-align:right;font-weight:500">${fmtH(v.hrs)}</span>
      <span style="text-align:right;color:var(--text2)">${ph!=null?fmtH(ph):'—'}</span>
      <span style="text-align:right">${ph!=null?dc(v.hrs,ph):'—'}</span>
    </div>
    <div id="drill_${rowId}" style="display:none">
      ${members.map(([m,mh])=>`<div class="drill-row" style="grid-template-columns:20px minmax(0,1fr) 64px"><i class="ti ti-user" aria-hidden="true" style="font-size:11px;color:var(--text3)"></i><span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${m}</span><span style="text-align:right;font-weight:500">${fmtH(mh)}</span></div>`).join('')}
    </div>`;
  }

  el.innerHTML=`<div class="card">
    <div class="card-head"><div class="card-title">By project — ${latest.label}</div><span style="font-size:11px;color:var(--text2)">${opening?`vs ${mon} P1`:'No baseline'} · click row to expand members</span></div>
    <div class="trow trow-hdr" style="grid-template-columns:22px minmax(0,1fr) 64px 64px 68px"><span></span><span>Project</span><span style="text-align:right">Forecast</span><span style="text-align:right">Opening</span><span style="text-align:right">Change</span></div>
    ${rows}
  </div>`;
}

function toggleDrill(id){
  const drill=document.getElementById('drill_'+id);
  const btn=document.getElementById('btn_'+id);
  const row=document.getElementById('row_'+id);
  if(!drill)return;
  const open=drill.style.display==='none';
  drill.style.display=open?'':'none';
  if(btn){btn.classList.toggle('open',open);}
  if(row){row.setAttribute('aria-expanded',open);}
}

// ── Members (pivot with drill-down to projects + capacity) ─
function renderMembers(){
  const mon=document.getElementById('monthFilter').value;
  const el=document.getElementById('tab-members');
  const snaps=getSnaps(mon);
  const opening=getOpening(snaps),latest=getLatest(snaps);
  if(!latest){el.innerHTML='<div class="card"><div style="padding:2rem;text-align:center;color:var(--text2)">No data.</div></div>';return;}

  const byMember=latest.byMember||{};
  const openByMember=opening?.byMember||{};
  const members=Object.entries(byMember).filter(([,v])=>v.hrs>0).sort((a,b)=>b[1].hrs-a[1].hrs);
  if(!members.length){el.innerHTML='<div class="card"><div style="padding:2rem;text-align:center;color:var(--text2)">No member data in this snapshot. Member breakdown available in live data only.</div></div>';return;}

  const maxH=members[0]?.[1].hrs||1;
  const thresh=capThreshold();
  let rows='';

  for(const[m,v]of members){
    const cap=v.adjustedCapacityHrs||memberCapacity[m]||null;
    const ph=openByMember[m]?.hrs||null;
    const diff=ph!=null?r1(v.hrs-ph):null;
    const bw=Math.round(v.hrs/maxH*50);
    const rowId='mem_'+m.replace(/[^a-z0-9]/gi,'_');
    const projects=v.projects?Object.entries(v.projects).sort((a,b)=>b[1]-a[1]):[]; 

    // Capacity display
    let capBadge='',capBar='';
    if(cap!=null){
      const pct=Math.min(100,Math.round(v.hrs/cap*100));
      const unused=r1(cap-v.hrs);
      const capCls=v.hrs<cap-thresh?'cap-available':v.hrs>cap?'cap-over':'cap-full';
      const capLbl=v.hrs<cap-thresh?`${unused}h free`:v.hrs>cap?'Over':'Full';
      const barColor=v.hrs<cap-thresh?'var(--green)':v.hrs>cap?'var(--red)':'var(--amber)';
      capBadge=`<span class="cap-badge ${capCls}">${capLbl}</span>`;
      capBar=`<div style="min-width:60px"><div class="cap-bar-wrap"><div class="cap-bar" style="width:${pct}%;background:${barColor}"></div></div><div style="font-size:9px;color:var(--text2);margin-top:2px;text-align:right">${r0(v.hrs)}/${r0(cap)}h</div></div>`;
    }

    rows+=`<div class="trow expandable" style="grid-template-columns:22px minmax(0,1fr) 60px 64px 68px ${cap!=null?'100px':''}" onclick="toggleDrill('${rowId}')" aria-expanded="false" id="row_${rowId}">
      <button class="expand-btn" id="btn_${rowId}" aria-label="Expand ${m}" ${projects.length?'':' style="visibility:hidden"'} onclick="event.stopPropagation();toggleDrill('${rowId}')"><i class="ti ti-chevron-right" aria-hidden="true" style="font-size:12px"></i></button>
      <div style="display:flex;align-items:center;gap:7px;min-width:0">
        <div class="spark" style="width:${bw}px;flex-shrink:0;max-width:50px"></div>
        <div style="width:22px;height:22px;border-radius:50%;background:var(--info-bg);display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:500;color:var(--info-text);flex-shrink:0">${m.split(' ').map(w=>w[0]).join('').slice(0,2)}</div>
        <span style="white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${m}</span>
      </div>
      <span style="text-align:right;font-weight:500">${fmtH(v.hrs)}</span>
      <span style="text-align:right">${diff!=null?(diff>=0?'+':'')+diff+'h':'—'}</span>
      <span style="text-align:right">${capBadge||'—'}</span>
      ${cap!=null?`<div style="display:flex;align-items:center;justify-content:flex-end">${capBar}</div>`:''}
    </div>
    <div id="drill_${rowId}" style="display:none">
      ${projects.map(([p,ph2])=>{
        const openPH=opening?.byProject[p]?.hrs||null;
        const projDiff=openPH!=null?r1(ph2-openPH):null;
        const dc2=projDiff!=null?(projDiff>=0?'+':'')+projDiff+'h':'—';
        const dc2cls=projDiff==null?'df':projDiff>0?'du':'dd';
        return`<div class="drill-row" style="grid-template-columns:20px minmax(0,1fr) 60px 68px"><i class="ti ti-briefcase" aria-hidden="true" style="font-size:11px;color:var(--text3)"></i><span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${p}</span><span style="text-align:right;font-weight:500">${fmtH(ph2)}</span><span style="text-align:right" class="${dc2cls}">${dc2}</span></div>`;
      }).join('')}
    </div>`;
  }

  el.innerHTML=`<div class="card">
    <div class="card-head"><div class="card-title">By member — ${latest.label}</div><span style="font-size:11px;color:var(--text2)">vs ${mon} P1 opening · capacity from Ruddr · click to expand projects</span></div>
    <div class="trow trow-hdr" style="grid-template-columns:22px minmax(0,1fr) 60px 64px 68px ${members.some(([,v])=>v.adjustedCapacityHrs!=null||memberCapacity[v])?'100px':''};font-size:10px;padding:5px 16px"><span></span><span>Member</span><span style="text-align:right">Forecast</span><span style="text-align:right">vs open</span><span style="text-align:right">Capacity</span>${members.some(([,v])=>v.adjustedCapacityHrs!=null)?'<span style="text-align:right">Utilisation</span>':''}
    </div>
    ${rows}
  </div>`;
}

// ── Capacity view ──────────────────────────────────────────
function renderCapacity(){
  const mon=document.getElementById('monthFilter').value;
  const el=document.getElementById('tab-capacity');
  const snaps=getSnaps(mon);
  const opening=getOpening(snaps),latest=getLatest(snaps);
  if(!latest||!latest.byMember){
    el.innerHTML='<div class="card"><div style="padding:2rem;text-align:center;color:var(--text2)"><i class="ti ti-user-check" aria-hidden="true" style="font-size:28px;display:block;margin-bottom:8px;opacity:.4"></i>Capacity data requires live Ruddr pull. Click Refresh to load.</div></div>';
    return;
  }

  const thresh=capThreshold();
  const byMember=latest.byMember||{};
  const openByMember=opening?.byMember||{};

  // Split into groups
  const available=[],atCapacity=[],overCapacity=[],noCapacity=[];
  for(const[m,v]of Object.entries(byMember).filter(([,v])=>v.hrs>0)){
    const cap=v.adjustedCapacityHrs||memberCapacity[m]||null;
    const openHrs=openByMember[m]?.hrs||null;
    const weekDrop=openHrs!=null?r1(openHrs-v.hrs):null;
    const entry={name:m,hrs:v.hrs,cap,openHrs,weekDrop,projects:v.projects||{},unused:cap!=null?r1(cap-v.hrs):null};
    if(cap==null)noCapacity.push(entry);
    else if(v.hrs>cap)overCapacity.push(entry);
    else if(v.hrs<cap-thresh)available.push(entry);
    else atCapacity.push(entry);
  }
  available.sort((a,b)=>b.unused-a.unused);
  overCapacity.sort((a,b)=>(b.hrs-b.cap)-(a.hrs-a.cap));

  const memberRow=(entry,highlight)=>{
    const{name,hrs,cap,openHrs,weekDrop,projects,unused}=entry;
    const pct=cap?Math.min(100,Math.round(hrs/cap*100)):0;
    const barColor=highlight==='available'?'var(--green)':highlight==='over'?'var(--red)':'var(--amber)';
    const rowId='cap_'+name.replace(/[^a-z0-9]/gi,'_');
    const projList=Object.entries(projects).sort((a,b)=>b[1]-a[1]);
    const dropBadge=weekDrop>0?`<span style="font-size:10px;color:var(--danger-text);margin-left:6px">↓${weekDrop}h from open</span>`:'';
    const unusedBadge=unused>thresh?`<span style="font-size:10px;color:var(--success-text);margin-left:6px">+${unused}h free</span>`:'';

    return`<div class="trow expandable" style="grid-template-columns:22px minmax(0,1fr) 60px 1fr 80px" onclick="toggleDrill('${rowId}')" id="row_${rowId}">
      <button class="expand-btn" id="btn_${rowId}" onclick="event.stopPropagation();toggleDrill('${rowId}')" ${projList.length?'':' style="visibility:hidden"'} aria-label="Expand ${name}"><i class="ti ti-chevron-right" aria-hidden="true" style="font-size:12px"></i></button>
      <div style="display:flex;align-items:center;gap:7px;min-width:0">
        <div style="width:22px;height:22px;border-radius:50%;background:var(--info-bg);display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:500;color:var(--info-text);flex-shrink:0">${name.split(' ').map(w=>w[0]).join('').slice(0,2)}</div>
        <div style="min-width:0"><div style="white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-weight:500">${name}</div><div style="font-size:10px;color:var(--text2)">${projList.length} project${projList.length!==1?'s':''} ${dropBadge}${unusedBadge}</div>${entry.timeOffHrs>0?`<div style="font-size:10px;color:var(--text2)">${r1(entry.rawCapacityHrs)}h raw − ${r1(entry.timeOffHrs)}h time off = ${r1(entry.adjustedCapacityHrs||0)}h adjusted</div>`:''}</div>
      </div>
      <span style="text-align:right;font-weight:500">${fmtH(hrs)}</span>
      <div style="padding:0 8px">
        <div class="cap-bar-wrap"><div class="cap-bar" style="width:${pct}%;background:${barColor}"></div></div>
        <div style="font-size:9px;color:var(--text2);margin-top:2px">${r0(hrs)}h of ${cap?r0(cap)+'h adj. capacity':'? capacity'}</div>
      </div>
      <span style="text-align:right;font-size:11px;${unused>thresh?'color:var(--success-text);font-weight:500':unused<0?'color:var(--danger-text)':'color:var(--text2)'}">${cap?`${pct}%`:'—'}</span>
    </div>
    <div id="drill_${rowId}" style="display:none">
      ${projList.map(([p,ph])=>`<div class="drill-row" style="grid-template-columns:20px minmax(0,1fr) 60px"><i class="ti ti-briefcase" aria-hidden="true" style="font-size:11px;color:var(--text3)"></i><span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${p}</span><span style="text-align:right;font-weight:500">${fmtH(ph)}</span></div>`).join('')}
    </div>`;
  };

  const section=(title,members,color,icon,highlight,note)=>members.length?`
    <div class="card" style="margin-bottom:16px">
      <div class="card-head" style="background:${color}08">
        <div style="display:flex;align-items:center;gap:8px"><i class="ti ${icon}" aria-hidden="true" style="color:${color}"></i><div class="card-title">${title} (${members.length})</div></div>
        ${note?`<span style="font-size:11px;color:var(--text2)">${note}</span>`:''}
      </div>
      <div class="trow trow-hdr" style="grid-template-columns:22px minmax(0,1fr) 60px 1fr 80px"><span></span><span>Member</span><span style="text-align:right">Forecast</span><span>Utilisation</span><span style="text-align:right">%</span></div>
      ${members.map(e=>memberRow(e,highlight)).join('')}
    </div>`:'';

  el.innerHTML=`
    <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px;margin-bottom:16px">
      <div class="metric"><div class="metric-lbl">Has capacity</div><div class="metric-val" style="color:var(--green)">${available.length}</div><div class="metric-sub">&gt;${thresh}h adjusted capacity free</div></div>
      <div class="metric"><div class="metric-lbl">At capacity</div><div class="metric-val" style="color:var(--amber)">${atCapacity.length}</div><div class="metric-sub">Within ${thresh}h</div></div>
      <div class="metric"><div class="metric-lbl">Over capacity</div><div class="metric-val" style="color:var(--red)">${overCapacity.length}</div><div class="metric-sub">Allocated over limit</div></div>
      <div class="metric"><div class="metric-lbl">Week-on-week drop</div><div class="metric-val">${[...available,...atCapacity].filter(e=>e.weekDrop>0).length}</div><div class="metric-sub">members with falling forecast</div></div>
    </div>
    ${section('Has capacity — can take more hours',available,'#639922','ti-circle-plus','available',`Members with &gt;${thresh}h unused adjusted capacity (after time off &amp; stats) — especially valuable where forecast has dropped`)}
    ${section('At capacity',atCapacity,'#BA7517','ti-equal','full','Fully allocated')}
    ${section('Over capacity',overCapacity,'#E24B4A','ti-alert-triangle','over','Review allocations')}
    ${noCapacity.length?`<div class="card"><div class="card-head"><div class="card-title">No capacity data (${noCapacity.length})</div><span style="font-size:11px;color:var(--text2)">Refresh live data to load Ruddr capacity</span></div>${noCapacity.map(e=>`<div class="trow" style="grid-template-columns:minmax(0,1fr) 60px"><span>${e.name}</span><span style="text-align:right;color:var(--text2)">${fmtH(e.hrs)}</span></div>`).join('')}</div>`:''}
  `;
}

// ── Timeline ───────────────────────────────────────────────
function renderTimeline(){

    <div style="position:relative;width:100%;height:220px"><canvas id="histChart" role="img" aria-label="Grouped bar FY26 monthly comparison."></canvas></div></div></div>
    <div class="card"><div class="card-head"><div class="card-title">Month summary</div></div>
    <div class="trow trow-hdr" style="grid-template-columns:70px 75px 75px 75px 80px"><span>Month</span><span style="text-align:right">Opening</span><span style="text-align:right">Latest</span><span style="text-align:right">Actual</span><span style="text-align:right">Δ (O→A)</span></div>
    ${ms.map(m=>{const o=m.opening?.totalHours,l=m.latest?.totalHours,a=m.actual?.totalHours;const d=o!=null&&a!=null?r1(a-o):o!=null&&l!=null?r1(l-o):null;const ds=d==null?'—':(d>=0?'+':'')+d+'h';const dc2=d==null?'df':d>0?'du':'dd';const liveTag=m.latest?.type==='live'?' <span class="pill pill-live" style="font-size:9px">live</span>':'';return`<div class="trow" style="grid-template-columns:70px 75px 75px 75px 80px"><span style="font-weight:500">${m.month}</span><span style="text-align:right">${o!=null?fmtH(o):'—'}</span><span style="text-align:right">${l!=null?fmtH(l):'—'}${liveTag}</span><span style="text-align:right;font-weight:500">${a!=null?fmtH(a):'—'}</span><span style="text-align:right" class="${dc2}">${ds}</span></div>`;}).join('')}
    </div>`;
  const ctx=document.getElementById('histChart');
  if(ctx)charts['hist']=new Chart(ctx,{type:'bar',data:{labels:ms.map(m=>m.month),datasets:[{label:'Opening',data:ms.map(m=>m.opening?r1(m.opening.totalHours):null),backgroundColor:'rgba(55,138,221,0.7)',borderRadius:3,borderSkipped:false},{label:'Latest',data:ms.map(m=>{const l=m.latest;return l&&l.type!=='actual'&&l.type!=='live'?r1(l.totalHours):null;}),backgroundColor:'rgba(99,153,34,0.7)',borderRadius:3,borderSkipped:false},{label:'Live',data:ms.map(m=>m.latest?.type==='live'?r1(m.latest.totalHours):null),backgroundColor:'rgba(127,119,221,0.8)',borderRadius:3,borderSkipped:false},{label:'Actual',data:ms.map(m=>m.actual?r1(m.actual.totalHours):null),backgroundColor:'rgba(186,117,23,0.85)',borderRadius:3,borderSkipped:false}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{mode:'index',intersect:false}},scales:{y:{beginAtZero:false,ticks:{callback:v=>v+'h',color:tc},grid:{color:gc}},x:{grid:{display:false},ticks:{color:tc}}}}});
}

// ── Routing ────────────────────────────────────────────────
function renderAll(){
  renderMetrics();
  if(activeTab==='heatmap')renderHeatmap();
  else if(activeTab==='projects')renderProjects();
  else if(activeTab==='members')renderMembers();
  else if(activeTab==='capacity')renderCapacity();
  else if(activeTab==='timeline')renderTimeline();
  else if(activeTab==='history')renderHistory();
}

function switchTab(tab,btn){
  activeTab=tab;
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  btn.classList.add('active');
  ['heatmap','projects','members','capacity','timeline','history'].forEach(t=>{
    document.getElementById('tab-'+t).style.display=t===tab?'':' none';
  });
  renderAll();
}

// ── Boot ───────────────────────────────────────────────────
document.getElementById('monthFilter').addEventListener('change',renderAll);
document.getElementById('refreshBtn').addEventListener('click',triggerLivePull);
document.getElementById('cutoverDate').addEventListener('change',triggerLivePull);
document.getElementById('capThreshold').addEventListener('change',renderAll);
renderAll();
triggerLivePull();
</script>
</body>
</html>
